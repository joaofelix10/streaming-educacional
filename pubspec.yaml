name: streaming_platform
description: Plataforma de streaming educacional e de entretenimento
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  go_router: ^13.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  video_player: ^2.8.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # ATIVAR OS ASSETS
  assets:
    - assets/images/
    - assets/videos/
    - assets/icons/